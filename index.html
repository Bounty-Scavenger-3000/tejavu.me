<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tejas MP</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #e8e2d9;
      --muted: #7a7570;
      --accent: #c8a97e;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.6;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 3rem;
      border-bottom: 1px solid var(--border);
    }

    .nav-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .nav-status {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem 3rem;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      line-height: 1.05;
      font-weight: 400;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      max-width: 480px;
      margin-bottom: 3.5rem;
      line-height: 1.75;
    }

    /* VIDEO */
    .video-block {
      margin-bottom: 3.5rem;
    }

    .video-label {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      max-width: 560px;
      aspect-ratio: 16/9;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* LINKS */
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }

    .link-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s, border-color 0.2s;
    }

    .link-pill:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    .link-pill svg {
      width: 14px;
      height: 14px;
      opacity: 0.6;
    }

    .link-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    /* FOOTER */
    footer {
      padding: 1.5rem 3rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    @media (max-width: 600px) {
      nav, main, footer { padding-left: 1.5rem; padding-right: 1.5rem; }
      .link-divider { display: none; }
      footer { flex-direction: column; gap: 0.5rem; text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <span class="nav-name">Tejas MP</span>
    <span class="nav-status">
      <span class="status-dot"></span>
      Building something
    </span>
  </nav>

  <main>
    <p class="eyebrow">— coming soon</p>
    <h1>The website is<br><em>on its way.</em></h1>
    <p class="subtitle">
      While i'm busy building the website, check out my sick Aura farming moment,
      You can even check out my LinkedIn or follow me on Instagram. 
    </p>

    <div class="video-block">
      <p class="video-label">— watch this while you wait</p>
      <div class="video-wrapper">
        <iframe
          src="https://www.youtube.com/embed/m_hjexjJEwg"
          title="Tejas MP Stand-up"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>
    </div>

    <div class="links">
      <a class="link-pill" href="mailto:gheepudimasaladosa@duck.com">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
        Email me
      </a>
      <div class="link-divider"></div>
      <a class="link-pill" href="https://instagram.com/tejavu.mp4" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/></svg>
        Instagram
      </a>
      <a class="link-pill" href="https://www.linkedin.com/in/accatejas" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="3"/><path d="M7 10v7M7 7v.01M12 17v-4a2 2 0 0 1 4 0v4M12 10v7"/></svg>
        LinkedIn
      </a>
    </div>
  </main>

  <footer>
    <span>tejavu.me</span>
    <span>© 2026 Tejas MP</span>
  </footer>

</body>
</html>
